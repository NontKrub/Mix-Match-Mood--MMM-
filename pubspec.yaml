name: mix_match_mood
description: AI Stylist and Digital Wardrobe App - Mix Match Mood (MMM)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  flutter_animate: ^4.5.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0

  # Image Handling
  image_picker: ^1.0.7
  image_cropper: ^5.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.0.0
  cached_network_image: ^3.3.1  # For offline caching

  # Color Detection
  color: ^3.0.0

  # Local Database (Hive for offline storage)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location & Weather
  geolocator: ^11.0.0
  http: ^1.2.1

  # State Management
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1

  # Utilities
  uuid: ^4.5.0
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
